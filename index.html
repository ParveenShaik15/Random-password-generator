<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault — password generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#171B22;
    --panel:#1F2430;
    --recess:#12151C;
    --brass:#C9A24B;
    --brass-dim:#8C743A;
    --parchment:#EDE6D6;
    --slate:#8891A1;
    --rust:#B3452F;
    --amber:#D8A23B;
    --sage:#6B8F5E;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--parchment);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
  }

  .plate{
    width:100%;
    max-width:480px;
    background:var(--panel);
    border-radius:16px;
    border:1px solid #313847;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
    padding:36px 36px 32px;
    position:relative;
  }
  .plate::before{
    content:"";
    position:absolute;
    top:14px; left:14px; right:14px; bottom:14px;
    border:1px solid #2A3040;
    border-radius:10px;
    pointer-events:none;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--brass);
    margin:0 0 4px;
    font-weight:600;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:26px;
    margin:0 0 24px;
    color:var(--parchment);
  }

  .readout{
    background:var(--recess);
    border-radius:8px;
    border:1px solid #2A3040;
    padding:20px 18px;
    margin-bottom:8px;
    position:relative;
    overflow:hidden;
  }
  .readout::after{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:3px;
    background:var(--brass-dim);
  }
  #password{
    font-family:'JetBrains Mono', monospace;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.03em;
    color:var(--amber);
    word-break:break-all;
    line-height:1.4;
    user-select:all;
  }

  .tumblers{
    display:flex;
    gap:4px;
    margin:12px 0 26px;
  }
  .tumbler{
    height:5px;
    flex:1;
    background:#2A3040;
    border-radius:3px;
    transition:background 0.25s ease;
  }
  .tumbler.on{background:var(--brass);}
  .tumbler.weak.on{background:var(--rust);}
  .tumbler.fair.on{background:var(--amber);}
  .tumbler.strong.on{background:var(--sage);}

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .row label{
    font-size:13px;
    color:var(--slate);
  }
  .row .val{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--brass);
    font-weight:500;
  }

  input[type=range]{
    width:100%;
    -webkit-appearance:none;
    appearance:none;
    height:4px;
    background:#2A3040;
    border-radius:2px;
    margin:10px 0 20px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--brass);
    border:2px solid var(--panel);
    cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--brass);
    border:2px solid var(--panel);
    cursor:pointer;
  }

  .toggles{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:26px;
  }
  .toggle{
    display:flex;
    align-items:center;
    gap:9px;
    padding:10px 12px;
    background:var(--recess);
    border:1px solid #2A3040;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    color:var(--slate);
    transition:border-color 0.15s ease, color 0.15s ease;
  }
  .toggle.active{
    border-color:var(--brass-dim);
    color:var(--parchment);
  }
  .toggle input{
    accent-color:var(--brass);
    width:15px;
    height:15px;
    cursor:pointer;
  }

  .actions{
    display:flex;
    gap:10px;
  }
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    border-radius:8px;
    border:none;
    padding:13px 18px;
    cursor:pointer;
    transition:transform 0.08s ease, background 0.15s ease;
  }
  button:active{transform:scale(0.97);}
  #generate{
    flex:2;
    background:var(--brass);
    color:#241C0B;
  }
  #generate:hover{background:#D6AE58;}
  #copy{
    flex:1;
    background:transparent;
    color:var(--parchment);
    border:1px solid #333B4A;
  }
  #copy:hover{border-color:var(--brass-dim);}

  .strength-label{
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--slate);
    margin-bottom:8px;
  }
</style>
</head>
<body>

<div class="plate">
  <p class="eyebrow">Vault</p>
  <h1>Draw a combination</h1>

  <div class="readout">
    <div id="password">— — — — — — — —</div>
  </div>
  <p class="strength-label" id="strength-text">Turn the crank to begin</p>
  <div class="tumblers" id="tumblers">
    <div class="tumbler"></div>
    <div class="tumbler"></div>
    <div class="tumbler"></div>
    <div class="tumbler"></div>
  </div>

  <div class="row">
    <label>Length</label>
    <span class="val" id="length-val">16</span>
  </div>
  <input type="range" id="length" min="6" max="48" value="16" step="1">

  <div class="toggles">
    <label class="toggle active" data-key="lower">
      <input type="checkbox" id="lower" checked> Lowercase a–z
    </label>
    <label class="toggle active" data-key="upper">
      <input type="checkbox" id="upper" checked> Uppercase A–Z
    </label>
    <label class="toggle active" data-key="digits">
      <input type="checkbox" id="digits" checked> Numbers 0–9
    </label>
    <label class="toggle active" data-key="symbols">
      <input type="checkbox" id="symbols" checked> Symbols !@#
    </label>
  </div>

  <div class="actions">
    <button id="generate">Draw combination</button>
    <button id="copy">Copy</button>
  </div>
</div>

<script>
  const lengthSlider = document.getElementById('length');
  const lengthVal = document.getElementById('length-val');
  const passwordEl = document.getElementById('password');
  const generateBtn = document.getElementById('generate');
  const copyBtn = document.getElementById('copy');
  const strengthText = document.getElementById('strength-text');
  const tumblers = document.querySelectorAll('.tumbler');

  const sets = {
    lower: 'abcdefghijklmnopqrstuvwxyz',
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    digits: '0123456789',
    symbols: '!@#$%^&*()-_=+[]{};:,.<>?'
  };

  const toggles = ['lower','upper','digits','symbols'].map(key => {
    const input = document.getElementById(key);
    const wrapper = input.closest('.toggle');
    input.addEventListener('change', () => {
      wrapper.classList.toggle('active', input.checked);
    });
    return input;
  });

  lengthSlider.addEventListener('input', () => {
    lengthVal.textContent = lengthSlider.value;
  });

  function currentCharset(){
    let charset = '';
    if(document.getElementById('lower').checked) charset += sets.lower;
    if(document.getElementById('upper').checked) charset += sets.upper;
    if(document.getElementById('digits').checked) charset += sets.digits;
    if(document.getElementById('symbols').checked) charset += sets.symbols;
    return charset;
  }

  function secureRandomChar(charset){
    const array = new Uint32Array(1);
    crypto.getRandomValues(array);
    return charset[array[0] % charset.length];
  }

  function generatePassword(){
    const charset = currentCharset();
    if(!charset){
      passwordEl.textContent = 'Select at least one set';
      passwordEl.style.color = 'var(--rust)';
      setTumblers(0);
      strengthText.textContent = 'No character sets selected';
      return;
    }
    passwordEl.style.color = 'var(--amber)';
    const length = parseInt(lengthSlider.value, 10);
    let result = '';
    for(let i = 0; i < length; i++){
      result += secureRandomChar(charset);
    }
    passwordEl.textContent = result;
    scoreStrength(length, charset.length);
  }

  function scoreStrength(length, poolSize){
    const entropy = length * Math.log2(poolSize || 1);
    let level, label;
    if(entropy < 40){ level = 1; label = 'Weak — add length or more sets'; }
    else if(entropy < 60){ level = 2; label = 'Fair — usable for low-stakes logins'; }
    else if(entropy < 80){ level = 3; label = 'Good — solid for most accounts'; }
    else { level = 4; label = 'Strong — safe for sensitive accounts'; }

    tumblers.forEach((t, i) => {
      t.classList.remove('on','weak','fair','strong');
      if(i < level){
        t.classList.add('on');
        if(level === 1) t.classList.add('weak');
        else if(level === 2) t.classList.add('fair');
        else t.classList.add('strong');
      }
    });
    strengthText.textContent = label + ' · ~' + Math.round(entropy) + ' bits';
  }

  function setTumblers(level){
    tumblers.forEach(t => t.classList.remove('on','weak','fair','strong'));
  }

  copyBtn.addEventListener('click', () => {
    const text = passwordEl.textContent;
    if(!text || text.includes('—') || text.includes('Select')) return;
    navigator.clipboard.writeText(text).then(() => {
      const original = copyBtn.textContent;
      copyBtn.textContent = 'Copied';
      setTimeout(() => { copyBtn.textContent = original; }, 1200);
    });
  });

  generateBtn.addEventListener('click', generatePassword);

  generatePassword();
</script>

</body>
</html>
